<div id="rpv1-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>RPv1 — Memory Engine</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <label class="checkbox_label" for="rpv1-enabled">
                <input id="rpv1-enabled" type="checkbox" checked />
                <span>Enable kernel</span>
            </label>

            <label for="rpv1-kernel-url">Kernel URL</label>
            <input id="rpv1-kernel-url" type="text" class="text_pole" placeholder="https://..." />

            <label class="checkbox_label" for="rpv1-low-spec">
                <input id="rpv1-low-spec" type="checkbox" checked />
                <span>Low-spec mode (server-side extraction)</span>
            </label>

            <div id="rpv1-status" style="margin-top: 8px; font-size: 0.9em; opacity: 0.7;">
                Connecting...
            </div>
        </div>
    </div>
</div>
